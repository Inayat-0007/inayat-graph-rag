version: "3.8"

services:
  neo4j:
    image: neo4j:5
    container_name: inayat-neo4j
    ports:
      - "7474:7474"
      - "7687:7687"
    environment:
      - NEO4J_AUTH=neo4j/inayat2026
      - NEO4J_server_memory_heap_initial__size=512m
      - NEO4J_server_memory_heap_max__size=1536m
      - NEO4J_server_memory_pagecache_size=256m
    volumes:
      - neo4j_data:/data
    mem_limit: 2g
    healthcheck:
      test: ["CMD", "cypher-shell", "-u", "neo4j", "-p", "inayat2026", "RETURN 1"]
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 30s
    restart: unless-stopped

  qdrant:
    image: qdrant/qdrant:latest
    container_name: inayat-qdrant
    ports:
      - "6333:6333"
    volumes:
      - qdrant_data:/qdrant/storage
    mem_limit: 512m
    restart: unless-stopped

volumes:
  neo4j_data:
  qdrant_data:
